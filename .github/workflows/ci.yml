name: CI

on:
  push:
    branches: [ main, master ]
    paths:
      - "contracts/**"
      - "scripts/check-contract-changelog-discipline.js"
      - "scripts/check-orphaned-scripts.js"
      - "tests/**"
      - "package.json"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [ main, master ]
    paths:
      - "contracts/**"
      - "scripts/check-contract-changelog-discipline.js"
      - "scripts/check-orphaned-scripts.js"
      - "tests/**"
      - "package.json"
      - ".github/workflows/ci.yml"

jobs:
  repo-policy-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Run lightweight repository tests
        run: npm test

      - name: Run orphaned-scripts detector
        run: node scripts/check-orphaned-scripts.js

      - name: Enforce contract changelog discipline
        env:
          CHANGELOG_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          CHANGELOG_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          CHANGELOG_PR_TITLE: ${{ github.event.pull_request.title || github.event.head_commit.message }}
          CHANGELOG_PR_BODY: ${{ github.event.pull_request.body || '' }}
        run: node scripts/check-contract-changelog-discipline.js

  build-and-test:
    needs: repo-policy-checks
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: contracts/earn-quest
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('contracts/earn-quest/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: contracts/earn-quest/target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('contracts/earn-quest/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-

      - name: Build workspace
        run: cargo build --release

      - name: Run tests
        run: cargo test

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: License policy check
        run: |
          cargo install cargo-deny
          make license-check

      - name: Build WASM
        run: cargo build --release --target wasm32-unknown-unknown
