name: Canary Testnet → Mainnet Promotion

on:
  workflow_dispatch:
    inputs:
      skip_mainnet:
        description: 'Deploy to testnet only (skip mainnet promotion)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  deploy-testnet:
    name: Deploy to Testnet (Canary)
    runs-on: ubuntu-latest
    environment: testnet
    outputs:
      contract_id: ${{ steps.deploy.outputs.contract_id }}
      wasm_hash: ${{ steps.deploy.outputs.wasm_hash }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/earn-quest/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/earn-quest/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Stellar CLI
        run: cargo install stellar-cli --locked 2>/dev/null || true

      - name: Build contract
        working-directory: contracts/earn-quest
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Deploy to testnet
        id: deploy
        working-directory: contracts/earn-quest
        env:
          SOROBAN_SECRET_KEY: ${{ secrets.TESTNET_DEPLOYER_SECRET_KEY }}
        run: |
          WASM=target/wasm32-unknown-unknown/release/earn_quest.wasm
          WASM_HASH=$(sha256sum "$WASM" | cut -d' ' -f1)

          CONTRACT_ID=$(stellar contract deploy \
            --source-account "$SOROBAN_SECRET_KEY" \
            --rpc-url https://soroban-testnet.stellar.org \
            --network-passphrase "Test SDF Network ; September 2015" \
            --wasm "$WASM")

          echo "contract_id=$CONTRACT_ID" >> "$GITHUB_OUTPUT"
          echo "wasm_hash=$WASM_HASH"     >> "$GITHUB_OUTPUT"
          echo "Deployed contract: $CONTRACT_ID"

  smoke-test:
    name: Smoke Tests (Testnet)
    runs-on: ubuntu-latest
    needs: deploy-testnet
    environment: testnet

    steps:
      - uses: actions/checkout@v4

      - name: Run smoke tests
        env:
          CONTRACT_ID: ${{ needs.deploy-testnet.outputs.contract_id }}
          SOROBAN_SECRET_KEY: ${{ secrets.TESTNET_DEPLOYER_SECRET_KEY }}
        run: bash stellar_Earn/scripts/smoke-test-testnet.sh

  promote-mainnet:
    name: Promote to Mainnet
    runs-on: ubuntu-latest
    needs: [deploy-testnet, smoke-test]
    # Requires a GitHub environment with a required reviewer configured
    environment: mainnet
    if: ${{ github.event.inputs.skip_mainnet != 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/earn-quest/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/earn-quest/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Stellar CLI
        run: cargo install stellar-cli --locked 2>/dev/null || true

      - name: Build contract (same WASM as testnet)
        working-directory: contracts/earn-quest
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Verify WASM hash matches testnet build
        working-directory: contracts/earn-quest
        run: |
          WASM=target/wasm32-unknown-unknown/release/earn_quest.wasm
          ACTUAL_HASH=$(sha256sum "$WASM" | cut -d' ' -f1)
          EXPECTED_HASH="${{ needs.deploy-testnet.outputs.wasm_hash }}"
          if [[ "$ACTUAL_HASH" != "$EXPECTED_HASH" ]]; then
            echo "WASM hash mismatch! Testnet: $EXPECTED_HASH  Mainnet build: $ACTUAL_HASH"
            exit 1
          fi
          echo "WASM hash verified: $ACTUAL_HASH"

      - name: Deploy to mainnet
        working-directory: contracts/earn-quest
        env:
          SOROBAN_SECRET_KEY: ${{ secrets.MAINNET_DEPLOYER_SECRET_KEY }}
        run: |
          WASM=target/wasm32-unknown-unknown/release/earn_quest.wasm

          CONTRACT_ID=$(stellar contract deploy \
            --source-account "$SOROBAN_SECRET_KEY" \
            --rpc-url https://soroban-mainnet.stellar.org \
            --network-passphrase "Public Global Stellar Network ; September 2015" \
            --wasm "$WASM")

          echo "Mainnet contract deployed: $CONTRACT_ID"
          echo "Testnet canary was: ${{ needs.deploy-testnet.outputs.contract_id }}"
